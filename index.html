<!DOCTYPE html>
<html>
<head>
    <title>Ilna Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        header {
            background: #0f172a;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            color: #38bdf8;
            margin: 0;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: #cbd5e1;
            margin: 0 10px;
            text-decoration: none;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
        }

        h2 {
            color: #38bdf8;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            cursor: pointer;
            color: black;
        }

        button:hover {
            background: #0ea5e9;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
        }

        img {
            width: 120px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

<header>
    <h1>Ilna</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<div class="container">

    <div class="card" id="about">
        <h2>About Me</h2>
        <p>I am a motivated student preparing for a scholarship in Canada. I love technology and coding.</p>
    </div>

    <div class="card" id="skills">
        <h2>Skills</h2>
        <p>HTML • CSS • Python • Problem Solving • Creativity</p>
    </div>

    <div class="card" id="contact">
        <h2>Contact</h2>
        <a href="mailto:yourmail@gmail.com">
            <button>Send Email</button>
        </a>
    </div>

</div>

<footer>
    <p>© 2026 Ilna | Built for Scholarship Portfolio</p>
</footer>

</body>
</html>
